<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraveCart — Order Online</title>
  <meta name="description" content="CraveCart: a scoped-down Swiggy/Zomato-style ordering flow — browse, cart, and live order tracking — built as a static web app." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <a href="#/" class="brand-link" id="brand-link">
      <span class="brand-mark">🍔</span>
      <span class="brand-word">CraveCart</span>
    </a>
    <button type="button" class="header-cart-btn" id="header-cart-btn" aria-label="View cart">
      🧾
      <span class="header-cart-count" id="header-cart-count" hidden>0</span>
    </button>
  </header>

  <main id="view-outlet" class="view-outlet"></main>

  <footer class="site-footer">
    A scoped-down Swiggy/Zomato-style flow — search, cart, live tracking — built as a static app, no backend. ·
    <a href="https://pages.github.com/" target="_blank" rel="noopener">Deployable on GitHub Pages</a>
  </footer>

  <div class="sr-only" id="live-region" aria-live="polite"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
