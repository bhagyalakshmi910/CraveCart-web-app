<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraveCart — Order Ticket</title>
  <meta name="description" content="CraveCart: a diner-counter ordering app with a live ticket, built from the original Python cart notebook." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <p class="brand-eyebrow">Order at the counter</p>
    <h1 class="brand-name" id="app-name">CraveCart</h1>
    <p class="brand-tagline">Fresh off the flat-top, straight to your ticket.</p>
  </header>

  <main class="layout">
    <div id="menu-board" aria-label="Menu"></div>

    <aside class="ticket-wrap" aria-label="Your order ticket">
      <div class="ticket">
        <div class="ticket-stamp" id="ticket-stamp">PAID</div>

        <div class="ticket-head">
          <div class="t-brand">CraveCart</div>
          <div class="t-meta">ORDER TICKET · COUNTER 1</div>
        </div>

        <ul class="ticket-lines" id="ticket-lines"></ul>

        <div class="ticket-totals">
          <div class="ticket-totals-row">
            <span>Subtotal</span>
            <span id="t-subtotal">€0.00</span>
          </div>
          <div class="ticket-totals-row">
            <span>Tax (7%)</span>
            <span id="t-tax">€0.00</span>
          </div>
          <div class="ticket-totals-row grand">
            <span>Total</span>
            <span id="t-total">€0.00</span>
          </div>
        </div>

        <div class="ticket-actions">
          <button type="button" class="btn-punch" id="btn-checkout" disabled>Punch Order</button>
          <button type="button" class="btn-clear" id="btn-clear" hidden>Clear ticket</button>
        </div>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    Built with a Python cart notebook as the starting point, reimagined as a static web app. ·
    <a href="https://pages.github.com/" target="_blank" rel="noopener">Deployable on GitHub Pages</a>
  </footer>

  <div class="toast" id="toast" role="status"></div>
  <div class="sr-only" id="live-region" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
